name = "atlassian-migration-advisor"
main = "index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

# KV Namespace for job state tracking
[[kv_namespaces]]
binding = "atlas_dc_analyzer_kv"
id = "cdb125d377d34ab5ab2e425bc67a2f60"
# preview_id can be set from list if needed

# R2 Bucket for report artifact storage
[[r2_buckets]]
index = 0
binding = "atlas_dc_analyzer_r2"
bucket_name = "atlas-dc-analyzer-r2"

[vars]
ENVIRONMENT = "development"
LOG_LEVEL = "debug"

# Secrets (set via: wrangler secret put SECRET_NAME)
# JIRA_DC_BASE_URL
# JIRA_DC_USERNAME
# JIRA_DC_API_TOKEN
# CONFLUENCE_DC_BASE_URL
# CONFLUENCE_DC_USERNAME
# CONFLUENCE_DC_API_TOKEN
# ANTHROPIC_API_KEY
# N8N_WEBHOOK_SECRET


[dev]
port = 8787
local_protocol = "http"
